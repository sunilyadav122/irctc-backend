name: irctc-backend

services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=admin
      - MYSQL_DATABASE=user_service
      - MYSQL_USER=admin
      - MYSQL_PASSWORD=admin
    volumes: 
      - mysql-data:/var/lib/mysql
  
  redis:
    image: redis/redis-stack:latest
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis-data:/data

  user-service:
    build: ./user-service
    container_name: user-service
    restart: always
    ports:
      - "3001:3001"
    depends_on:
      - mysql
      - redis

volumes:
  mysql-data:
  redis-data: